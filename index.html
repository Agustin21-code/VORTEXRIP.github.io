<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZARYA VAULT | Digital Assets</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">VORTEX<span>RIP</span></div>
            <div class="category-dropdown">
            <button class="dropbtn-cat" id="cat-btn">Categorías ▼</button>
            <div class="category-content" id="category-menu">
                <a href="#" onclick="filterByCategory('Todos')">Todos</a>
                <a href="#" onclick="filterByCategory('Acción')">Acción</a>
                <a href="#" onclick="filterByCategory('Simulación')">Simulación</a>
                <a href="#" onclick="filterByCategory('Terror')">Terror</a>
                <a href="#" onclick="filterByCategory('Supervivencia')">Supervivencia</a>
            </div>
        </div>

        <input type="text" id="search" placeholder="Buscar juego...">
    </div>
</nav>
    </header>

    <main class="container">
        <h1 class="section-title">Juegos Gratis</h1>
        <div class="grid-games game-links" id="game-container">
            </div>
    </main>

    <div id="download-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modal-title"></h2>
            <img id="modal-img" src="" alt="">
            <p>Estado: <span class="status-online">Disponible</span></p>
            <div class="download-links">
                <a href="#" id="btn-mega" class="btn-dl">MEGA</a>
                <a href="#" id="btn-mediafire" class="btn-dl">MEDIAFIRE</a>
                <a href="#" id="btn-torrent" class="btn-dl">TORRENT</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
