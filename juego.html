<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles del Juego | NULLTRACE</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .details-container { padding: 40px 5%; max-width: 900px; margin: auto; }
        .game-header { display: flex; gap: 30px; margin-bottom: 40px; }
        .game-header img { width: 300px; border-radius: 10px; border: 2px solid #ce9d10; }
        .specs { background: #1a1a1a; padding: 20px; border-radius: 10px; margin-top: 20px; }
        .download-box { margin-top: 30px; display: flex; gap: 15px; }
        .btn-download { background: #ce9d10; color: #000; padding: 15px 30px; text-decoration: none; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="details-container">
        <a href="index.html" style="color: #ce9d10; text-decoration: none;">← Volver al inicio</a>
        
        <div class="game-header">
            <img id="game-img" src="" alt="">
            <div>
                <h1 id="game-title"></h1>
                <p>Categoría: <span id="game-cat" style="color: #ce9d10;"></span></p>
                <div class="specs">
                    <h3>Requisitos Mínimos:</h3>
                    <p id="game-req">Cargando requisitos...</p>
                </div>
            </div>
        </div>

        <h2>Enlaces de Descarga</h2>
        <div class="download-box">
            <a href="#" id="link-mega" class="btn-download" target="_blank">Descargar por GOFILE/MEGA</a>
        </div>
    </div>

    <script>
        // LEER LOS DATOS DE LA URL
        const params = new URLSearchParams(window.location.search);
        document.getElementById('game-title').innerText = params.get('title');
        document.getElementById('game-cat').innerText = params.get('cat');
        document.getElementById('game-img').src = params.get('img');
        document.getElementById('link-mega').href = params.get('url');
        
        // Aquí podrías poner requisitos personalizados si quieres
        document.getElementById('game-req').innerText = "Procesador i5, 8GB RAM, GTX 1050 o similar.";
    </script>
</body>
</html>
